<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyEat Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,700&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0d0f;
      --line: rgba(15, 14, 12, 0.13);
      --mono: "DM Mono", monospace;
      --max: 1512px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      overflow-x: hidden;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 80;
      padding: 1.2rem 1.4rem;
      transition: background 0.25s ease, border-color 0.25s ease;
      border-bottom: 1px solid transparent;
    }

    .nav.scrolled {
      background: rgba(247, 244, 239, 0.9);
      backdrop-filter: blur(12px);
      border-color: var(--line);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav a {
      text-decoration: none;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .nav-back {
      padding: 0.48rem 0.72rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .nav-back:hover {
      transform: translateY(-1px);
      border-color: #a68e7b;
    }

    .page {
      width: min(100vw, 1512px);
      margin-inline: auto;
      margin-top: 56px;
      position: relative;
      line-height: 0;
    }

    .page svg,
    .page object,
    .page img {
      display: block;
      width: 100%;
      height: auto;
    }

  </style>
</head>
<body>
  <nav class="nav" id="nav" aria-label="Case study navigation">
    <div class="nav-inner">
      <a href="./index.html" class="nav-back">Back to Portfolio</a>
      <a href="mailto:gauravavinash3@gmail.com">Contact</a>
    </div>
  </nav>
  <main class="page" aria-label="EasyEat case study webpage">
    <object
      data="assets/easyeat-case-study.svg"
      type="image/svg+xml"
      aria-label="EasyEat case study design"
    >
      <img src="assets/easyeat-pdf-page.png" alt="EasyEat case study fallback image">
    </object>
  </main>
  <script>
    const nav = document.getElementById("nav");
    window.addEventListener("scroll", () => {
      nav.classList.toggle("scrolled", window.scrollY > 30);
    });
  </script>
</body>
</html>
